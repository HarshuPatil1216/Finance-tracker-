# MySQL Connection Settings
# Change localhost:3306 to your MySQL server address if different
# The 'fintrace' database must exist in your MySQL server
spring.datasource.url=jdbc:mysql://localhost:3306/fintrace?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD_HERE

# Hibernate and JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server configuration
server.port=8080

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Email Configuration
# Note: Use your Gmail App Password, not your regular password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fintrace.app@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
